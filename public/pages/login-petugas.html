<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi BPN - Login Internal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Public+Sans:wght@500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/css/login-bpn.css">
</head>

<body class="mobile-body">
    <div class="mobile-viewport-container">
        <div class="mobile-viewport">

            <div class="header-area">
                <div class="logo-text-container">
                    <img src="/img/logo-bpn.svg" alt="BPN" class="target-logo" onerror="this.style.display='none'">
                    <h1 class="target-title">Sistem Permohonan <br><span class="text-yellow">Jadwal Pemeriksaan Tanah</span>
                    </h1>
                    <div class="title-line"></div>
                    <p class="target-subtitle">Halaman otentikasi khusus untuk Petugas Lapangan dan Administrator sistem
                        BPN Luwu Timur.</p>
                </div>

                <div class="info-card">
                    <div class="info-icon" style="background-color: #E74C3C; color: white;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <div class="info-text">
                        <strong>Akses Terbatas Sistem</strong>
                        <span>Aktivitas login dicatat dan diawasi</span>
                        <span>oleh administrator jaringan.</span>
                    </div>
                </div>
            </div>

            <div class="target-card">
                <div class="card-accent-corner"></div>

                <div class="tab-container">
                    <button class="tab-btn active" id="btn-tab-petugas" onclick="switchTab('petugas')">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <div class="tab-text">
                            <strong>PETUGAS</strong>
                            <span>Pegawai Lapangan</span>
                        </div>
                    </button>
                    <button class="tab-btn" id="btn-tab-admin" onclick="switchTab('admin')">
                        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <div class="tab-text">
                            <strong>ADMIN</strong>
                            <span>Pengelola Sistem</span>
                        </div>
                    </button>
                </div>

                <div id="form-petugas" style="display: block;">
                    <div class="form-fields">
                        <label>Nomor Induk Pegawai (NIP) <span style="color: #E74C3C;">*</span></label>
                        <div class="input-wrapper">
                            <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                </path>
                                <circle cx="8" cy="12" r="3"></circle>
                                <line x1="14" y1="10" x2="20" y2="10"></line>
                                <line x1="14" y1="14" x2="20" y2="14"></line>
                            </svg>
                            <input type="text" id="nip" placeholder="Masukkan NIP Anda" autocomplete="off">
                        </div>

                        <label>Kata sandi <span style="color: #E74C3C;">*</span></label>
                        <div class="input-wrapper">
                            <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="pet-password" placeholder="••••••••••••">
                            <svg class="icon-right" onclick="togglePass('pet-password')" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </div>
                    </div>

                    <div class="button-group">
                        <div id="pet-error" class="alert alert-error" style="display:none; margin-bottom: 16px;"></div>
                        <button class="btn-masuk" onclick="loginPetugas()">
                            Masuk ke Portal
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-left: 8px;">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="form-admin" style="display: none;">
                    <div class="form-fields">
                        <label>Username Administrator <span style="color: #E74C3C;">*</span></label>
                        <div class="input-wrapper">
                            <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="username" placeholder="Masukkan Username" autocomplete="off">
                        </div>

                        <label>Kata sandi <span style="color: #E74C3C;">*</span></label>
                        <div class="input-wrapper">
                            <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="adm-password" placeholder="••••••••••••">
                            <svg class="icon-right" onclick="togglePass('adm-password')" width="18" height="18"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                </path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </div>
                    </div>

                    <div class="button-group">
                        <div id="adm-error" class="alert alert-error" style="display:none; margin-bottom: 16px;"></div>
                        <button class="btn-masuk" onclick="loginAdmin()">
                            Masuk ke Portal
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-left: 8px;">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('form-petugas').style.display = tab === 'petugas' ? 'block' : 'none';
            document.getElementById('form-admin').style.display = tab === 'admin' ? 'block' : 'none';

            if (tab === 'petugas') {
                document.getElementById('btn-tab-petugas').classList.add('active');
                document.getElementById('btn-tab-admin').classList.remove('active');
            } else {
                document.getElementById('btn-tab-admin').classList.add('active');
                document.getElementById('btn-tab-petugas').classList.remove('active');
            }
        }

        function togglePass(id) {
            const input = document.getElementById(id);
            if (input.type === 'password') input.type = 'text';
            else input.type = 'password';
        }

        async function loginPetugas() {
            const nip = document.getElementById('nip').value.trim();
            const password = document.getElementById('pet-password').value;
            const errEl = document.getElementById('pet-error');
            errEl.style.display = 'none';

            if (!nip || !password) {
                errEl.textContent = 'NIP dan kata sandi wajib diisi.';
                errEl.style.display = 'flex';
                return;
            }
            try {
                const res = await fetch('/api/auth/login-petugas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nip, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.message;
                    errEl.style.display = 'flex';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('nama', data.nama);
                localStorage.setItem('role', 'petugas');
                window.location.href = '/petugas';
            } catch (err) {
                errEl.textContent = 'Terjadi kesalahan server.';
                errEl.style.display = 'flex';
            }
        }

        async function loginAdmin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('adm-password').value;
            const errEl = document.getElementById('adm-error');
            errEl.style.display = 'none';

            if (!username || !password) {
                errEl.textContent = 'Username dan kata sandi wajib diisi.';
                errEl.style.display = 'flex';
                return;
            }
            try {
                const res = await fetch('/api/auth/login-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.message;
                    errEl.style.display = 'flex';
                    return;
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('nama', data.nama);
                localStorage.setItem('role', data.role);
                window.location.href = '/admin';
            } catch (err) {
                errEl.textContent = 'Terjadi kesalahan server.';
                errEl.style.display = 'flex';
            }
        }
    </script>
</body>

</html>
